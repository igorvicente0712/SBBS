services:
  broker:
    build: ./broker
    ports:
      - "5555:5555"
      - "5556:5556"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import zmq; ctx=zmq.Context(); s=ctx.socket(zmq.REQ); s.connect('tcp://localhost:5555')\""]
      interval: 2s
      timeout: 5s
      retries: 10

  pubsub_proxy:
    build: ./pubsub_proxy
    ports:
      - "5557:5557"
      - "5558:5558"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import zmq; ctx=zmq.Context(); s=ctx.socket(zmq.PUB); s.connect('tcp://localhost:5557')\""]
      interval: 2s
      timeout: 5s
      retries: 10

  server1:
    build: ./server
    environment:
      - BROKER_ADDR=tcp://broker:5556
      - PUBSUB_ADDR=tcp://pubsub_proxy:5557
      - DB_PATH=/data/shared.db
      - SERVER_ID=server1
    volumes:
      - ./data:/data
    depends_on:
      broker:
        condition: service_healthy
      pubsub_proxy:
        condition: service_healthy

  server2:
    build: ./server
    environment:
      - BROKER_ADDR=tcp://broker:5556
      - PUBSUB_ADDR=tcp://pubsub_proxy:5557
      - DB_PATH=/data/shared.db
      - SERVER_ID=server2
    volumes:
      - ./data:/data
    depends_on:
      broker:
        condition: service_healthy
      pubsub_proxy:
        condition: service_healthy

  client1:
    build: ./client
    environment:
      - BROKER_ADDR=tcp://broker:5555
      - PUBSUB_ADDR=tcp://pubsub_proxy:5558
      - BOT_NAME=bot1
    depends_on:
      broker:
        condition: service_healthy
      pubsub_proxy:
        condition: service_healthy

  client2:
    build: ./client
    environment:
      - BROKER_ADDR=tcp://broker:5555
      - PUBSUB_ADDR=tcp://pubsub_proxy:5558
      - BOT_NAME=bot2
    depends_on:
      broker:
        condition: service_healthy
      pubsub_proxy:
        condition: service_healthy