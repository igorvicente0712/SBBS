services:
  broker:
    image: igorvicente0712/broker:latest
    ports:
      - "5555:5555"
      - "5556:5556"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import zmq; ctx=zmq.Context(); s=ctx.socket(zmq.REQ); s.connect('tcp://localhost:5555')\""]
      interval: 2s
      timeout: 5s
      retries: 10

  server1:
    image: igorvicente0712/server:latest
    environment:
      - BROKER_ADDR=tcp://broker:5556
      - DB_PATH=/data/shared.db
    volumes:
      - ./data:/data
    depends_on:
      broker:
        condition: service_healthy

  server2:
    image: igorvicente0712/server:latest
    environment:
      - BROKER_ADDR=tcp://broker:5556
      - DB_PATH=/data/shared.db
    volumes:
      - ./data:/data
    depends_on:
      broker:
        condition: service_healthy

  client1:
    image: igorvicente0712/client:latest
    environment:
      - BROKER_ADDR=tcp://broker:5555
      - BOT_NAME=bot1
    depends_on:
      broker:
        condition: service_healthy

  client2:
    image: igorvicente0712/client:latest
    environment:
      - BROKER_ADDR=tcp://broker:5555
      - BOT_NAME=bot2
    depends_on:
      broker:
        condition: service_healthy